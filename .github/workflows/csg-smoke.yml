# Smoke-test the `csg` Cargo feature across all wheel-release platforms.
# Tracks GH #22 — the `csg` feature pulls in `manifold-csg`, which
# compiles the C++ Manifold library via cmake. The native build path
# is cross-platform-fragile, and `release.yml` would only surface a
# break at tag time. This workflow runs `cargo check --features csg`
# plus the end-to-end `cut_openings_integration` test on the same five
# targets `release.yml` produces wheels for — informational only,
# not a required gate, until it's been green across a few merges.
#
# Also smoke-tests the off-by-default `prism-csg-fast` feature
# (GH #58 W6/W9, pure-Rust i_overlay 2D Boolean). The default
# `cargo test` lane never builds it, so without this it would bit-rot;
# and since it's pure Rust, the cross-platform check doubles as proof
# of the cross-compile-clean claim (incl. linux-aarch64, GH #28).
name: csg-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.os }} / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: windows-latest
            label: windows-x64
          - os: macos-15-intel
            label: macos-x86_64
          - os: macos-latest
            label: macos-aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo check --features csg
        run: cargo check -p ifcfast-core --features csg
      # The integration test links the rlib half of `ifcfast-core` into a
      # test binary. With default features, pyo3's `extension-module` is
      # enabled and Python symbols (`_Py_TrueStruct`, …) are deferred to
      # runtime — Linux/Windows linkers tolerate this for a cdylib build
      # but macOS rejects undefined symbols in an executable. The test
      # itself doesn't touch pyo3, so build it without the `python`
      # feature; `--features csg` still activates the mesh+geom chain.
      - name: cargo test --no-default-features --features csg --test cut_openings_integration
        run: cargo test -p ifcfast-core --no-default-features --features csg --test cut_openings_integration --release
      # prism-csg-fast (GH #58 W6/W9) — pure-Rust i_overlay path, off by
      # default. Check it compiles everywhere (cross-compile proof) and
      # the polygon_bool facade tests pass. `--no-default-features` keeps
      # pyo3 out so the test binary links on macOS.
      - name: cargo check --features prism-csg-fast
        run: cargo check -p ifcfast-core --features prism-csg-fast
      - name: cargo test --no-default-features --features prism-csg-fast (polygon_bool)
        run: cargo test -p ifcfast-core --no-default-features --features prism-csg-fast --lib polygon_bool --release
