# Build multi-platform wheels and publish to PyPI on tag push.
# Tags must be of the form v*  (e.g. v0.1.0, v0.2.0).
#
# Publish uses PyPI Trusted Publishing (OIDC). Before the first release:
#   1. Create the project on PyPI (or TestPyPI).
#   2. Add a "pending publisher" pointing at this repo / workflow / environment.
#      Owner: EdvardGK   Repo: ifcfast   Workflow: release.yml   Environment: pypi
# Reference: https://docs.pypi.org/trusted-publishers/
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path crates/core/Cargo.toml
          manylinux: auto
      - name: Smoke-test built wheel (native arch only)
        if: ${{ matrix.target == 'x86_64' }}
        run: |
          pip install pytest
          pip install ifcfast --no-index --find-links dist
          pytest tests/test_smoke.py -q
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --manifest-path crates/core/Cargo.toml
      - name: Smoke-test built wheel
        run: |
          pip install pytest
          pip install ifcfast --no-index --find-links dist
          pytest tests/test_smoke.py -q
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-x64
          path: dist

  macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path crates/core/Cargo.toml
      - name: Smoke-test built wheel
        run: |
          pip install pytest
          pip install ifcfast --no-index --find-links dist
          pytest tests/test_smoke.py -q
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/core/Cargo.toml
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    environment: pypi
    permissions:
      id-token: write       # OIDC token for Trusted Publishing
      contents: write       # Attach artifacts to the GitHub release
      attestations: write   # Sign artifacts
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
