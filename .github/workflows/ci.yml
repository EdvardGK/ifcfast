# Fast feedback CI - runs on every push and PR.
# Heavy multi-platform wheel builds live in release.yml (tag-triggered).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo test
        run: cargo test --release

  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install maturin and build extension
        run: |
          pip install maturin pytest
          maturin develop --release --manifest-path crates/core/Cargo.toml
      - name: Run pytest
        run: pytest -q
