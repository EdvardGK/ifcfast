# Fast feedback CI - runs on every push and PR.
# Heavy multi-platform wheel builds live in release.yml (tag-triggered).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo test
        run: cargo test --release

  cargo-audit:
    # Scan the committed Cargo.lock against the RustSec advisory DB.
    # Catches CVEs in transitive deps before they ship — see GH #51.
    # Lockfile changes auto-rerun this; advisory-only failures (no
    # lockfile change but a new CVE published) surface on the next push.
    #
    # Invoked directly (not via `rustsec/audit-check`) because that
    # action posts a GitHub check-run, which needs `checks: write` AND
    # treats every warning as a failure regardless of audit.toml. Our
    # gate is just "does `cargo audit` return non-zero?" — `audit.toml`
    # handles allowlisted advisories and gives us a clean exit 0 on
    # currently-acceptable warnings.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        run: cargo audit

  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install ifcfast (builds Rust extension via maturin)
        run: pip install .
      - name: Install pytest
        run: pip install pytest
      - name: Run pytest
        run: pytest -q
